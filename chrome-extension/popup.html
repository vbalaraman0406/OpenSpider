<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: sans-serif;
        }

        h3 {
            margin-top: 0;
            color: #333;
        }

        .row {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 12px;
        }

        input {
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #FF4500;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button.detach {
            background: #666;
        }

        button.cookie-btn {
            background: #22c55e;
            margin-top: 10px;
        }

        .status {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }

        .hint {
            font-size: 10px;
            color: #999;
            margin-top: 2px;
        }
    </style>
</head>

<body>
    <h3>OpenSpider Browser Relay</h3>
    <div class="row">
        <label>Gateway Host</label>
        <input type="text" id="host" value="127.0.0.1" placeholder="127.0.0.1 or VPS IP" />
        <div class="hint">Use VPS IP for remote setup (e.g., 34.82.1.100)</div>
    </div>
    <div class="row">
        <label>Gateway Port</label>
        <input type="number" id="port" value="4001" />
    </div>
    <div class="row">
        <label>Gateway Token</label>
        <input type="password" id="token" placeholder="API key from .env" />
    </div>
    <button id="toggleBtn">Attach to Current Tab</button>
    <button id="cookieBtn" class="cookie-btn">Export Cookies to OpenSpider</button>
    <div class="status" id="statusText">Not connected</div>
    <script src="popup.js"></script>
</body>

</html>

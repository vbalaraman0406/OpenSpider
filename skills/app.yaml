runtime: python311
service: backend
instance_class: F2

entrypoint: gunicorn -w 2 -k uvicorn.workers.UvicornWorker app.main:app --bind :$PORT

env_variables:
  PITWALL_ENV: "production"

automatic_scaling:
  min_instances: 0
  max_instances: 4
  target_cpu_utilization: 0.65
  min_pending_latency: 30ms
  max_pending_latency: automatic
